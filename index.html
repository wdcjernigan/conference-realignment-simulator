<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBS Realignment Simulator</title>
    <style>
        /* Dark Mode Theme */
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            overflow: hidden;
        }
        
        #map-container { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            background: #020617; /* Even darker for the map area */
        }
        
        svg { width: 100%; height: 100%; max-width: 800px; max-height: 500px; }
        
        /* Map elements */
        #map-outline { fill: #1e293b; stroke: #475569; stroke-width: 2; }
        .team-node { cursor: pointer; transition: all 0.2s; stroke: #fff; stroke-width: 1; }
        .team-node:hover { stroke-width: 4; transform: scale(1.2); }
        .dithered { opacity: 0.15; filter: url(#stripe-filter); }

        /* Sidebar */
        #controls { 
            flex: 0 0 320px; 
            padding: 20px; 
            background: var(--panel); 
            border-left: 1px solid var(--border);
            overflow-y: auto; 
        }
        .card { border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #0f172a; }
        select, input, button { 
            width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; 
            border: 1px solid var(--border); background: var(--panel); color: white;
        }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<svg width="0" height="0">
    <defs>
        <pattern id="stripe-pattern" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" style="stroke:#94a3b8; stroke-width:2" />
        </pattern>
        <mask id="stripe-mask"><rect width="100%" height="100%" fill="url(#stripe-pattern)"/></mask>
        <filter id="stripe-filter"><feComposite in="SourceGraphic" in2="stripe-mask" operator="in" /></filter>
    </defs>
</svg>

<div id="map-container">
    <svg viewBox="0 0 800 500">
        <rect id="map-outline" x="50" y="50" width="700" height="400" rx="10" />
        <g id="team-layer"></g>
    </svg>
</div>

<div id="controls">
    <h2>FBS Simulator</h2>
    <label>Filter Conference:</label>
    <select id="filter-select" onchange="applyFilter()">
        <option value="All">All Conferences</option>
        <option value="SEC">SEC</option>
        <option value="Big Ten">Big Ten</option>
        <option value="Big 12">Big 12</option>
        <option value="ACC">ACC</option>
    </select>

    <div id="editor" class="card" style="display:none;">
        <h3 id="team-name">Team Name</h3>
        <label>Assign Conference:</label>
        <select id="conf-reassign" onchange="updateTeam()">
            <option value="SEC">SEC</option>
            <option value="Big Ten">Big Ten</option>
            <option value="Big 12">Big 12</option>
            <option value="ACC">ACC</option>
        </select>
    </div>

    <div class="card">
        <h3>Save Configuration</h3>
        <input type="text" id="save-name" placeholder="Config Name">
        <button onclick="saveConfig()">Save</button>
        <select id="load-select" onchange="loadConfig()">
            <option value="">-- Load Configuration --</option>
        </select>
    </div>
</div>

<script>
    const confColors = { 'SEC': '#ef4444', 'Big Ten': '#3b82f6', 'Big 12': '#f97316', 'ACC': '#10b981' };
    let teams = [
        { id: 'OSU', name: 'Ohio State', conf: 'Big Ten', x: 500, y: 150 },
        { id: 'TEX', name: 'Texas', conf: 'Big 12', x: 300, y: 300 },
        { id: 'USC', name: 'USC', conf: 'SEC', x: 150, y: 200 },
        { id: 'MIA', name: 'Miami', conf: 'ACC', x: 600, y: 350 }
    ];
    let selectedId = null;

    function renderMap() {
        const layer = document.getElementById('team-layer');
        layer.innerHTML = '';
        teams.forEach(t => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", t.x);
            circle.setAttribute("cy", t.y);
            circle.setAttribute("r", 15);
            circle.setAttribute("fill", confColors[t.conf]);
            circle.setAttribute("class", "team-node");
            circle.onclick = () => selectTeam(t.id);
            layer.appendChild(circle);
        });
        applyFilter();
    }

    function selectTeam(id) {
        selectedId = id;
        const team = teams.find(t => t.id === id);
        document.getElementById('editor').style.display = 'block';
        document.getElementById('team-name').innerText = team.name;
        document.getElementById('conf-reassign').value = team.conf;
    }

    function updateTeam() {
        const team = teams.find(t => t.id === selectedId);
        team.conf = document.getElementById('conf-reassign').value;
        renderMap();
    }

    function applyFilter() {
        const filter = document.getElementById('filter-select').value;
        const nodes = document.querySelectorAll('.team-node');
        teams.forEach((t, i) => {
            nodes[i].classList.toggle('dithered', filter !== 'All' && t.conf !== filter);
        });
    }

    function saveConfig() {
        const name = document.getElementById('save-name').value || 'Default';
        localStorage.setItem('fbs_config_' + name, JSON.stringify(teams));
        updateLoadDropdown();
    }

    function updateLoadDropdown() {
        const select = document.getElementById('load-select');
        select.innerHTML = '<option value="">-- Load Configuration --</option>';
        Object.keys(localStorage).filter(k => k.startsWith('fbs_config_')).forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.innerText = k.replace('fbs_config_', '');
            select.appendChild(opt);
        });
    }

    function loadConfig() {
        const key = document.getElementById('load-select').value;
        if (!key) return;
        teams = JSON.parse(localStorage.getItem(key));
        renderMap();
    }

    renderMap();
    updateLoadDropdown();
</script>
</body>
</html>
