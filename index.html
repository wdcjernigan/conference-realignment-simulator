<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBS Realignment Simulator</title>
    <style>
        :root { --bg: #f4f4f9; --panel: #ffffff; }
        
        /* Force the body to take full height and prevent overflow */
        body { 
            font-family: sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg); 
            overflow: hidden; /* Prevents scrollbars on the whole page */
        }
        
        /* Map Container: Takes 70% of width, allows it to shrink */
        #map-container { 
            flex: 2; 
            position: relative; 
            border-right: 2px solid #ddd; 
            padding: 20px; 
            min-width: 0; /* Critical for flex child sizing */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Ensure SVG maintains aspect ratio and fills its container */
        svg { 
            width: 100%; 
            height: 100%; 
            max-height: 80vh; /* Keeps it from being too tall */
            display: block; 
        }
        
        .team-node { cursor: pointer; transition: opacity 0.3s, stroke-width 0.2s; stroke: #333; stroke-width: 1; }
        .team-node:hover { stroke-width: 4; }
        .dithered { opacity: 0.25; filter: url(#stripe-filter); }

        /* Control Panel: Takes 30% of width, allows vertical scrolling */
        #controls { 
            flex: 0 0 300px; /* Fixed width sidebar */
            padding: 20px; 
            background: var(--panel); 
            overflow-y: auto; 
        }
        
        .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        select, input, button { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<svg width="0" height="0">
    <defs>
        <pattern id="stripe-pattern" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" style="stroke:#555; stroke-width:2" />
        </pattern>
        <mask id="stripe-mask"><rect width="100%" height="100%" fill="url(#stripe-pattern)"/></mask>
        <filter id="stripe-filter"><feComposite in="SourceGraphic" in2="stripe-mask" operator="in" /></filter>
    </defs>
</svg>

<div id="map-container">
    <svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
        <rect width="800" height="500" fill="#fdfdfd" stroke="#ccc" />
        <g id="team-layer"></g>
    </svg>
</div>

<div id="controls">
    <h2>Conference Simulator</h2>
    <label>Filter View:</label>
    <select id="filter-select" onchange="applyFilter()">
        <option value="All">All Conferences</option>
        <option value="SEC">SEC</option>
        <option value="Big Ten">Big Ten</option>
        <option value="Big 12">Big 12</option>
        <option value="ACC">ACC</option>
    </select>

    <div id="editor" class="card" style="display:none;">
        <h3 id="team-name">Team Name</h3>
        <label>Assign Conference:</label>
        <select id="conf-reassign" onchange="updateTeam()">
            <option value="SEC">SEC</option>
            <option value="Big Ten">Big Ten</option>
            <option value="Big 12">Big 12</option>
            <option value="ACC">ACC</option>
        </select>
    </div>

    <div class="card">
        <h3>Save Configuration</h3>
        <input type="text" id="save-name" placeholder="Config Name">
        <button onclick="saveConfig()">Save to LocalStorage</button>
        <select id="load-select" onchange="loadConfig()">
            <option value="">-- Load Configuration --</option>
        </select>
    </div>
</div>

<script>
    const confColors = { 'SEC': '#e63946', 'Big Ten': '#457b9d', 'Big 12': '#f4a261', 'ACC': '#2a9d8f' };
    let teams = [
        { id: 'OSU', name: 'Ohio State', conf: 'Big Ten', x: 500, y: 150 },
        { id: 'TEX', name: 'Texas', conf: 'Big 12', x: 300, y: 300 },
        { id: 'USC', name: 'USC', conf: 'SEC', x: 150, y: 200 },
        { id: 'MIA', name: 'Miami', conf: 'ACC', x: 600, y: 350 }
    ];
    let selectedId = null;

    function renderMap() {
        const layer = document.getElementById('team-layer');
        layer.innerHTML = '';
        teams.forEach(t => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", t.x);
            circle.setAttribute("cy", t.y);
            circle.setAttribute("r", 20);
            circle.setAttribute("fill", confColors[t.conf] || '#999');
            circle.setAttribute("class", "team-node");
            circle.onclick = () => selectTeam(t.id);
            layer.appendChild(circle);
        });
        applyFilter();
    }

    function selectTeam(id) {
        selectedId = id;
        const team = teams.find(t => t.id === id);
        document.getElementById('editor').style.display = 'block';
        document.getElementById('team-name').innerText = team.name;
        document.getElementById('conf-reassign').value = team.conf;
    }

    function updateTeam() {
        const team = teams.find(t => t.id === selectedId);
        team.conf = document.getElementById('conf-reassign').value;
        renderMap();
    }

    function applyFilter() {
        const filter = document.getElementById('filter-select').value;
        const nodes = document.querySelectorAll('.team-node');
        teams.forEach((t, i) => {
            nodes[i].classList.toggle('dithered', filter !== 'All' && t.conf !== filter);
        });
    }

    function saveConfig() {
        const name = document.getElementById('save-name').value || 'Default';
        localStorage.setItem('fbs_config_' + name, JSON.stringify(teams));
        updateLoadDropdown();
    }

    function updateLoadDropdown() {
        const select = document.getElementById('load-select');
        select.innerHTML = '<option value="">-- Load Configuration --</option>';
        Object.keys(localStorage).filter(k => k.startsWith('fbs_config_')).forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.innerText = k.replace('fbs_config_', '');
            select.appendChild(opt);
        });
    }

    function loadConfig() {
        const key = document.getElementById('load-select').value;
        if (!key) return;
        teams = JSON.parse(localStorage.getItem(key));
        renderMap();
    }

    renderMap();
    updateLoadDropdown();
</script>
</body>
</html>
